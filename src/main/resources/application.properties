spring.application.name=LatinoamericaComparte

# PostgreSQL - usa variables de entorno en produccion, valores locales como fallback
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/latinoamerica_comparte_integrador}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:1234}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Puerto - Railway inyecta PORT automaticamente
server.port=${PORT:8081}

# Formularios PUT y DELETE
spring.mvc.hiddenmethod.filter.enabled=true

# Thymeleaf
spring.thymeleaf.cache=false

# Admin seed
app.admin.email=${ADMIN_EMAIL:admin@comparte.com}
app.admin.password=${ADMIN_PASSWORD:admin1234}