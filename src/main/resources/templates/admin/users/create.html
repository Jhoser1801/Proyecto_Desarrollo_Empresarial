<!DOCTYPE html>
<html class="light" lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head-admin :: head-admin('Nuevo Administrador')}">
    <title>Nuevo Administrador</title>
</head>
<body class="bg-background text-on-surface">

<div th:replace="~{fragments/sidebar :: sidebar('usuarios')}"></div>

<main class="md:ml-64 pt-16 md:pt-0 min-h-[1024px] p-8 lg:p-12 flex flex-col items-center textile-pattern bg-surface">
    <div class="w-full max-w-2xl">

        <header class="flex items-center gap-4 mb-10">
            <a th:href="@{/admin/users}"
               class="flex items-center justify-center w-10 h-10 rounded-xl bg-surface-container text-on-surface-variant hover:bg-surface-container-low transition-colors">
                <span class="material-symbols-outlined">arrow_back</span>
            </a>
            <div>
                <span class="text-xs font-bold tracking-widest text-secondary uppercase font-label">Gestión de Acceso</span>
                <h2 class="text-4xl font-black text-primary font-headline mt-1 tracking-tighter">Nuevo Administrador</h2>
            </div>
        </header>

        <!-- Error flash -->
        <div th:if="${errorMessage}"
             class="mb-6 flex items-center gap-3 bg-red-50 border border-red-200 text-red-700 px-5 py-4 rounded-2xl">
            <span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1">error</span>
            <span class="font-bold" th:text="${errorMessage}"></span>
        </div>

        <form th:action="@{/admin/users}" th:object="${userRequest}" method="post"
              class="bg-surface-container-lowest rounded-3xl p-8 shadow-sm space-y-6">

            <!-- Nombre -->
            <div>
                <label for="name" class="block text-sm font-bold text-on-surface mb-2">
                    Nombre completo *
                </label>

                <input id="name"
                       type="text"
                       th:field="*{name}"
                       placeholder="Juan Pérez"
                       th:classappend="${#fields.hasErrors('name')} ? 'border-red-400 focus:ring-red-300 focus:border-red-400' : ''"
                       class="w-full px-4 py-3 rounded-xl border border-outline-variant/40 bg-surface-container-low focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-all"/>

                <p th:if="${#fields.hasErrors('name')}"
                   th:errors="*{name}"
                   class="text-xs text-red-500 mt-1 ml-1"></p>
            </div>

            <!-- Email -->
            <div>
                <label for="email" class="block text-sm font-bold text-on-surface mb-2">
                    Correo Electrónico *
                </label>

                <input id="email"
                       type="email"
                       th:field="*{email}"
                       placeholder="admin@comparte.com"
                       th:classappend="${#fields.hasErrors('email')} ? 'border-red-400 focus:ring-red-300 focus:border-red-400' : ''"
                       class="w-full px-4 py-3 rounded-xl border border-outline-variant/40 bg-surface-container-low focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-all"/>

                <p th:if="${#fields.hasErrors('email')}"
                   th:errors="*{email}"
                   class="text-xs text-red-500 mt-1 ml-1"></p>
            </div>

            <!-- Contraseña -->
            <div>
                <label for="passwordInput" class="block text-sm font-bold text-on-surface mb-2">
                    Contraseña *
                </label>

                <div class="relative">
                    <input id="passwordInput"
                           type="password"
                           th:field="*{password}"
                           placeholder="Mínimo 8 caracteres"
                           th:classappend="${#fields.hasErrors('password')} ? 'border-red-400 focus:ring-red-300 focus:border-red-400' : ''"
                           class="w-full px-4 py-3 rounded-xl border border-outline-variant/40 bg-surface-container-low focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-all pr-12"/>

                    <!-- PRUEBA: se pasa 'passwordInput' y 'toggleIcon' explícitamente
                         para que togglePassword() encuentre el input correcto.
                         Antes llamaba togglePassword() sin args y buscaba id="password" (no existía). -->
                    <button type="button"
                            onclick="togglePassword('passwordInput', 'toggleIcon')"
                            class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors">
                        <span class="material-symbols-outlined" id="toggleIcon">visibility</span>
                    </button>
                </div>
            </div>

            <div class="flex items-center gap-4 pt-2">
                <button type="submit"
                        class="flex items-center gap-2 bg-primary text-white px-8 py-3 rounded-full font-bold shadow-md hover:shadow-lg hover:bg-primary-container transition-all duration-200">
                    <span class="material-symbols-outlined">person_add</span>
                    <span>Crear Administrador</span>
                </button>
                <a th:href="@{/admin/users}"
                   class="text-on-surface-variant px-6 py-3 rounded-full font-medium hover:bg-surface-container transition-colors">
                    Cancelar
                </a>
            </div>
        </form>

    </div>
</main>

<script th:src="@{/js/app.js}" src="/js/app.js"></script>
</body>
</html>
