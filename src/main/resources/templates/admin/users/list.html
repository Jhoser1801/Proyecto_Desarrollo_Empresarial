<!DOCTYPE html>
<html class="light" lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head-admin :: head-admin('Administradores')}">
    <title>Administradores</title>
</head>
<body class="bg-background text-on-surface">

<div th:replace="~{fragments/sidebar :: sidebar('usuarios')}"></div>

<main class="md:ml-64 pt-16 md:pt-0 min-h-[1024px] p-8 lg:p-12 textile-pattern bg-surface">
    <header class="mb-10 flex flex-col md:flex-row md:justify-between md:items-end gap-4">
        <div>
            <span class="text-xs font-bold tracking-widest text-secondary uppercase font-label">Gestión de Acceso</span>
            <h2 class="text-4xl font-black text-primary font-headline mt-2 tracking-tighter">Administradores</h2>
        </div>
        <a th:href="@{/admin/users/create}"
           class="flex items-center gap-2 bg-primary text-white px-6 py-3 rounded-full font-bold shadow-md hover:shadow-lg hover:bg-primary-container transition-all duration-200 w-full md:w-auto">
            <span class="material-symbols-outlined">person_add</span>
            <span>Nuevo Administrador</span>
        </a>
    </header>

    <!-- Mensajes flash -->
    <div th:if="${successMessage}" class="mb-6 flex items-center gap-3 bg-green-50 border border-green-200 text-green-700 px-5 py-4 rounded-2xl">
        <span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1">check_circle</span>
        <span class="font-bold" th:text="${successMessage}"></span>
    </div>
    <div th:if="${errorMessage}" class="mb-6 flex items-center gap-3 bg-red-50 border border-red-200 text-red-700 px-5 py-4 rounded-2xl">
        <span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1">error</span>
        <span class="font-bold" th:text="${errorMessage}"></span>
    </div>

    <div class="bg-surface-container-lowest rounded-3xl shadow-sm overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full min-w-[480px]">
            <thead>
            <tr class="bg-surface-container-low border-b border-outline-variant/20">
                <th class="text-left px-6 py-4 text-xs font-bold uppercase tracking-widest text-on-surface-variant">Nombre</th>
                <th class="text-left px-6 py-4 text-xs font-bold uppercase tracking-widest text-on-surface-variant">Correo Electrónico</th>
                <th class="text-center px-6 py-4 text-xs font-bold uppercase tracking-widest text-on-surface-variant">Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="u : ${users}" class="border-b border-outline-variant/10 hover:bg-surface-container-low transition-colors">
                <td class="px-6 py-4">
                    <div class="flex items-center gap-3">
                        <div class="w-9 h-9 rounded-full bg-primary-fixed flex items-center justify-center text-primary font-bold text-sm"
                             th:text="${#strings.substring(u.name, 0, 1).toUpperCase()}"></div>
                        <span class="font-medium text-on-surface" th:text="${u.name}"></span>
                    </div>
                </td>
                <td class="px-6 py-4 text-sm text-on-surface-variant" th:text="${u.email}"></td>
                <td class="px-6 py-4">
                    <div class="flex items-center justify-center gap-3">

                        <a th:href="@{/admin/users/edit/{id}(id=${u.adminId})}"
                           title="Editar"
                           class="flex items-center justify-center w-9 h-9 rounded-xl bg-primary/5 text-primary hover:bg-primary hover:text-white transition-all duration-200">

                            <svg th:replace="fragments/icons :: edit"></svg>
                        </a>

                        <a th:href="@{/admin/users/delete/{id}(id=${u.adminId})}"
                           title="Eliminar"
                           class="flex items-center justify-center w-9 h-9 rounded-xl bg-red-50 text-red-500 hover:bg-red-500 hover:text-white transition-all duration-200">

                            <svg th:replace="fragments/icons :: delete"></svg>
                        </a>

                    </div>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(users)}">
                <td colspan="4" class="px-6 py-12 text-center text-on-surface-variant">
                    <span class="material-symbols-outlined text-4xl block mb-2">manage_accounts</span>
                    No hay administradores registrados.
                </td>
            </tr>
            </tbody>
        </table>
    </div>
    </div>
</main>
</body>
</html>
