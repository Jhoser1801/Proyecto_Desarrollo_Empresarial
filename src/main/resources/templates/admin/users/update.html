<!DOCTYPE html>
<html class="light" lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head-admin :: head-admin('Editar Administrador')}">
    <title>Editar Administrador</title>
</head>
<body class="bg-background text-on-surface">

<div th:replace="~{fragments/sidebar :: sidebar('usuarios')}"></div>

<main class="md:ml-64 pt-16 md:pt-0 min-h-[1024px] p-8 lg:p-12 flex flex-col items-center textile-pattern bg-surface">
    <div class="w-full max-w-4xl">

        <header class="flex items-center gap-4 mb-10">
            <a th:href="@{/admin/users}"
               class="flex items-center justify-center w-10 h-10 rounded-xl bg-surface-container text-on-surface-variant hover:bg-surface-container-low transition-colors">
                <span class="material-symbols-outlined">arrow_back</span>
            </a>
            <div>
                <span class="text-xs font-bold tracking-widest text-secondary uppercase font-label">Gestión de Acceso</span>
                <h2 class="text-4xl font-black text-primary font-headline mt-1 tracking-tighter">Editar Administrador</h2>
            </div>
        </header>

        <!-- Error flash -->
        <div th:if="${errorMessage}"
             class="mb-6 flex items-center gap-3 bg-red-50 border border-red-200 text-red-700 px-5 py-4 rounded-2xl">
            <span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1">error</span>
            <span class="font-bold" th:text="${errorMessage}"></span>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">

            <!-- Formulario -->
            <form th:action="@{/admin/users/{id}(id=${user.adminId})}" th:object="${userRequest}" th:method="put"
                  class="bg-surface-container-lowest rounded-3xl p-8 shadow-sm space-y-6">

                <!-- Nombre -->
                <div>
                    <label for="nameInput" class="block text-sm font-bold text-on-surface mb-2">
                        Nombre completo *
                    </label>

                    <input type="text"
                           th:field="*{name}"
                           id="nameInput"
                           oninput="updatePreview()"
                           th:classappend="${#fields.hasErrors('name')} ? 'border-red-400 focus:ring-red-300 focus:border-red-400' : ''"
                           class="w-full px-4 py-3 rounded-xl border border-outline-variant/40 bg-surface-container-low focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-all"/>

                    <p th:if="${#fields.hasErrors('name')}"
                       th:errors="*{name}"
                       class="text-xs text-red-500 mt-1 ml-1"></p>
                </div>

                <!-- Email -->
                <div>
                    <label for="emailInput" class="block text-sm font-bold text-on-surface mb-2">
                        Correo Electrónico *
                    </label>

                    <input type="email"
                           th:field="*{email}"
                           id="emailInput"
                           oninput="updatePreview()"
                           th:classappend="${#fields.hasErrors('email')} ? 'border-red-400 focus:ring-red-300 focus:border-red-400' : ''"
                           class="w-full px-4 py-3 rounded-xl border border-outline-variant/40 bg-surface-container-low focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-all"/>

                    <p th:if="${#fields.hasErrors('email')}"
                       th:errors="*{email}"
                       class="text-xs text-red-500 mt-1 ml-1"></p>
                </div>

                <!-- Contraseña opcional -->
                <div>
                    <label for="passwordInput" class="block text-sm font-bold text-on-surface mb-2">
                        Nueva contraseña
                    </label>

                    <div class="relative">
                        <input type="password"
                               id="passwordInput"
                               th:field="*{password}"
                               placeholder="Dejar en blanco para no cambiar"
                               th:classappend="${#fields.hasErrors('password')} ? 'border-red-400 focus:ring-red-300 focus:border-red-400' : ''"
                               class="w-full px-4 py-3 rounded-xl border border-outline-variant/40 bg-surface-container-low focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-all pr-12"/>

                        <!-- PRUEBA: se pasa 'passwordInput' y 'toggleIcon' explícitamente
                             para que togglePassword() encuentre el input correcto.
                             Antes llamaba togglePassword() sin args y buscaba id="password" (no existía). -->
                        <button type="button"
                                onclick="togglePassword('passwordInput', 'toggleIcon')"
                                class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors">
                            <span class="material-symbols-outlined" id="toggleIcon">visibility</span>
                        </button>
                    </div>

                    <p th:if="${#fields.hasErrors('password')}"
                       th:errors="*{password}"
                       class="text-xs text-red-500 mt-1 ml-1"></p>

                    <p th:unless="${#fields.hasErrors('password')}"
                       class="text-xs text-on-surface-variant mt-1 ml-1">
                        Si lo dejas en blanco, la contraseña actual no cambia.
                    </p>
                </div>

                <!-- Botones -->
                <div class="flex items-center gap-4 pt-2">
                    <button type="submit"
                            class="flex items-center gap-2 bg-primary text-white px-8 py-3 rounded-full font-bold shadow-md hover:shadow-lg hover:bg-primary-container transition-all duration-200">
                        <span class="material-symbols-outlined">save</span>
                        <span>Guardar Cambios</span>
                    </button>
                    <a th:href="@{/admin/users}"
                       class="text-on-surface-variant px-6 py-3 rounded-full font-medium hover:bg-surface-container transition-colors">
                        Cancelar
                    </a>
                </div>
            </form>

            <!-- Vista previa del perfil -->
            <div class="space-y-3">
                <p class="text-sm font-bold text-on-surface-variant uppercase tracking-widest px-1">Vista Previa</p>
                <div class="bg-surface-container-lowest rounded-3xl p-8 shadow-sm space-y-6 border border-outline-variant/20">

                    <!-- Avatar + nombre -->
                    <div class="flex items-center gap-4">
                        <div id="previewAvatar"
                             class="w-16 h-16 rounded-2xl bg-primary flex items-center justify-center text-white font-black text-2xl shadow-lg shadow-primary/20">
                        </div>
                        <div>
                            <p id="previewName" class="text-lg font-black text-on-surface font-headline"></p>
                            <p class="text-xs font-bold text-secondary uppercase tracking-widest mt-0.5">Administrador</p>
                        </div>
                    </div>

                    <!-- Datos -->
                    <div class="space-y-3">
                        <div class="bg-surface-container-low rounded-xl px-4 py-3">
                            <span class="block text-[10px] font-bold text-on-surface-variant/60 uppercase tracking-widest mb-1">Correo</span>
                            <span id="previewEmail" class="text-sm font-bold text-primary"></span>
                        </div>

                        <div class="bg-surface-container-low rounded-xl px-4 py-3">
                            <span class="block text-[10px] font-bold text-on-surface-variant/60 uppercase tracking-widest mb-1">Contraseña</span>
                            <span class="text-sm font-bold text-on-surface-variant">••••••••</span>
                        </div>
                    </div>
                </div>

                <!-- Advertencia de seguridad -->
                <div class="bg-amber-50 border border-amber-200 rounded-2xl p-4 flex items-start gap-3">
                    <span class="material-symbols-outlined text-amber-500 mt-0.5 text-xl"
                          style="font-variation-settings:'FILL' 1">lock</span>
                    <p class="text-xs text-amber-700 font-medium">
                        Por seguridad, si cambias la contraseña el administrador deberá usar la nueva al próximo inicio de sesión.
                    </p>
                </div>
            </div>

        </div>

    </div>
</main>

<script th:src="@{/js/app.js}" src="/js/app.js"></script>
<script th:src="@{/js/user-preview.js}" src="/js/user-preview.js"></script>
</body>
</html>
