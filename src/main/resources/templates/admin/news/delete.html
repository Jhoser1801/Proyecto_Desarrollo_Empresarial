<!DOCTYPE html>
<html class="light" lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head-admin :: head-admin('Eliminar Noticia')}">
    <title>Eliminar Noticia</title>
</head>
<body class="bg-background text-on-surface">

<div th:replace="~{fragments/sidebar :: sidebar('noticias')}"></div>

<main class="md:ml-64 pt-16 md:pt-0 min-h-[1024px] p-8 lg:p-12 flex flex-col items-center textile-pattern bg-surface">
    <div class="w-full max-w-4xl">
        <header class="flex items-center gap-4 mb-10">
            <a th:href="@{/admin/news}" class="flex items-center justify-center w-10 h-10 rounded-xl bg-surface-container text-on-surface-variant hover:bg-surface-container-low transition-colors">
                <span class="material-symbols-outlined">arrow_back</span>
            </a>
            <div>
                <span class="text-xs font-bold tracking-widest text-secondary uppercase font-label">Gestión de Contenido</span>
                <h2 class="text-4xl font-black text-primary font-headline mt-1 tracking-tighter">Eliminar Noticia</h2>
            </div>
        </header>

        <div class="flex justify-center">
            <div class="w-full max-w-md">
                <div class="bg-surface-container-lowest rounded-3xl p-8 shadow-sm">
                    <div class="flex items-center justify-center w-16 h-16 bg-red-50 rounded-2xl mb-6">
                        <span class="material-symbols-outlined text-3xl text-red-500" style="font-variation-settings:'FILL' 1">warning</span>
                    </div>

                    <h3 class="text-xl font-bold text-on-surface font-headline mb-2">¿Estás seguro?</h3>
                    <p class="text-on-surface-variant mb-6">
                        Estás a punto de eliminar esta noticia. Esta acción <span class="font-bold text-red-500">no se puede deshacer</span>.
                    </p>

                    <!-- Detalles de la noticia -->
                    <div class="bg-surface-container-low rounded-2xl overflow-hidden mb-8">
                        <div class="w-full h-32 bg-surface-container overflow-hidden">
                            <img th:if="${news.imageUrl != null and !#strings.isEmpty(news.imageUrl)}"
                                 th:src="${news.imageUrl}" th:alt="${news.title}"
                                 class="w-full h-full object-cover"
                                 onerror="this.style.display='none'"/>
                        </div>
                        <div class="p-4 space-y-1">
                            <p class="font-bold text-on-surface" th:text="${news.title}"></p>
                            <p class="text-xs text-on-surface-variant" th:text="${news.author}"></p>
                            <p class="text-xs text-on-surface-variant" th:text="${#temporals.format(news.getPublicationDate(), 'dd/MM/yyyy')}"></p>
                        </div>
                    </div>

                    <form th:action="@{/admin/news/{id}(id=${news.newsId})}" th:method="delete" class="flex items-center gap-4">
                        <button type="submit"
                                class="flex items-center gap-2 bg-red-500 text-white px-8 py-3 rounded-full font-bold shadow-md hover:bg-red-600 transition-all duration-200">

                            <svg th:replace="fragments/icons :: delete" class="w-5 h-5 shrink-0"></svg>
                            <span>Sí, eliminar</span>

                        </button>
                        <a th:href="@{/admin/news}"
                           class="text-on-surface-variant px-6 py-3 rounded-full font-medium hover:bg-surface-container transition-colors">
                            Cancelar
                        </a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
