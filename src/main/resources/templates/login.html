<!DOCTYPE html>
<html class="light" lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Iniciar Sesión</title>
    <link rel="icon" type="image/x-icon" th:href="@{/images/logo-ecuador.ico}">

    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <script th:src="@{/js/tailwind-config.js}" ></script>
    <link  th:href="@{/css/login.css}" rel="stylesheet">
</head>

<body class="bg-pattern text-on-surface min-h-screen flex justify-center p-4 py-10"
      th:classappend="${param.logout} ? 'items-start' : 'items-center'">

<!-- Orbes -->
<div class="orb w-96 h-96 bg-primary/10 -top-24 -left-24 fixed"></div>
<div class="orb w-80 h-80 bg-secondary/8 bottom-0 right-0 fixed"></div>

<div class="w-full max-w-sm relative z-10">

    <!-- Marca -->
    <div class="text-center mb-10 animate-in">

        <div class="relative inline-flex items-center justify-center w-28 h-28 mb-5">

            <div class="absolute inset-0 rounded-3xl bg-gradient-to-br from-primary to-secondary opacity-20 blur-xl scale-110"></div>

            <div class="relative w-full h-full bg-white/90 backdrop-blur-md rounded-3xl shadow-[0_20px_50px_rgba(39,27,131,0.18)] border border-white/60 p-4 hover:scale-105 transition-all duration-300">
                <img th:src="@{/images/logo-ecuador.png}"
                     src="/images/logo-ecuador.png"
                     alt="Logo Ecuador Comparte"
                     class="w-full h-full object-contain drop-shadow-md">
            </div>

        </div>

        <h1 class="text-3xl font-black text-on-surface font-headline tracking-tight leading-none">
            Ecuador Comparte
        </h1>

        <p class="text-sm text-on-surface-variant mt-2 font-medium tracking-wide">
            Panel de Administración
        </p>

    </div>

    <!-- Formulario -->
    <div class="bg-white/75 backdrop-blur-2xl border border-white/50 rounded-3xl shadow-[0px_24px_60px_rgba(39,27,131,0.10)] p-8 animate-in-delay overflow-hidden relative bg-pattern">

        <h2 class="text-xl font-black text-on-surface font-headline tracking-tight mb-1">
            Bienvenido de nuevo
        </h2>

        <p class="text-sm text-on-surface-variant mb-8">
            Ingresa tus credenciales para continuar.
        </p>

        <!-- Error -->
        <div th:if="${param.error}"
             class="flex items-center gap-3 bg-error-container text-error px-4 py-3 rounded-2xl mb-6 text-sm font-medium">

            <span class="material-symbols-outlined text-sm flex-shrink-0"
                  style="font-variation-settings:'FILL' 1">
                error
            </span>

            <span>Usuario o contraseña incorrectos.</span>
        </div>

        <!-- Logout -->
        <div th:if="${param.logout}"
             class="flex items-center gap-3 bg-success-bg text-success-text border border-success-border px-4 py-3 rounded-2xl mb-6 text-sm font-medium">

            <span class="material-symbols-outlined text-sm flex-shrink-0"
                  style="font-variation-settings:'FILL' 1">
                check_circle
            </span>

            <span>Has cerrado sesión correctamente.</span>
        </div>

        <form th:action="@{/login}" method="post" class="space-y-5 relative z-10">

            <!-- Usuario -->
            <div>
                <label for="username"
                       class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2">
                    Usuario
                </label>

                <div class="relative">

                    <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant/50 text-xl pointer-events-none">
                        person
                    </span>

                    <input
                            type="text"
                            id="username"
                            name="username"
                            placeholder="Ingresa tu usuario"
                            required
                            autocomplete="username"
                            class="input-field w-full pl-11 pr-4 py-3.5 rounded-xl border border-outline-variant/50 bg-surface-container-low text-sm font-medium text-on-surface placeholder:text-on-surface-variant/40"
                    />
                </div>
            </div>

            <!-- Contraseña -->
            <div>
                <label for="password"
                       class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2">
                    Contraseña
                </label>

                <div class="relative">

                    <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant/50 text-xl pointer-events-none">
                        lock
                    </span>

                    <input
                            type="password"
                            id="password"
                            name="password"
                            placeholder="••••••••"
                            required
                            autocomplete="current-password"
                            class="input-field w-full pl-11 pr-12 py-3.5 rounded-xl border border-outline-variant/50 bg-surface-container-low text-sm font-medium text-on-surface placeholder:text-on-surface-variant/40"
                    />

                    <button type="button"
                            onclick="togglePassword()"
                            class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant/50 hover:text-primary transition-colors">

                        <span id="toggleIcon"
                              class="material-symbols-outlined text-xl">
                            visibility
                        </span>

                    </button>

                </div>
            </div>

            <!-- Botón -->
            <button type="submit"
                    class="btn-primary w-full text-white py-4 rounded-xl font-bold text-sm tracking-wide flex items-center justify-center gap-2 mt-2">

                <span>Ingresar al panel</span>

                <span class="material-symbols-outlined text-base">
                    arrow_forward
                </span>

            </button>

        </form>
    </div>

    <!-- Volver -->
    <div class="text-center mt-6 animate-in-delay">
        <a th:href="@{/}"
           class="inline-flex items-center gap-1.5 text-xs font-medium text-on-surface-variant hover:text-primary transition-colors">

            <span class="material-symbols-outlined text-sm">
                arrow_back
            </span>

            Volver al sitio
        </a>
    </div>

</div>

<script th:src="@{/js/app.js}" src="/js/app.js"></script>

</body>
</html>
